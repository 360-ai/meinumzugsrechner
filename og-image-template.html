<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: "Arial Black", Impact, sans-serif;
      background-color: #0D2137;
    }

    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 80% 50%, rgba(0,136,204,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 10% 80%, rgba(255,119,0,0.15) 0%, transparent 50%);
    }

    /* Subtle grid pattern */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,136,204,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,136,204,0.06) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Orange accent bar top */
    .topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, #0088CC 0%, #FF7700 50%, #FFCC00 100%);
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      height: 100%;
      padding: 0 80px;
      gap: 60px;
    }

    /* Left: text */
    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .domain {
      font-family: Arial, sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 20px;
    }
    .domain .blue  { color: #0088CC; }
    .domain .orange { color: #FF7700; }

    .headline {
      font-size: 56px;
      font-weight: 900;
      line-height: 1.0;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: #ffffff;
      margin-bottom: 18px;
    }
    .headline .accent {
      color: #FFCC00;
    }

    .sub {
      font-family: Arial, sans-serif;
      font-size: 20px;
      font-weight: 400;
      color: rgba(255,255,255,0.65);
      line-height: 1.5;
      max-width: 520px;
      margin-bottom: 28px;
    }

    .badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .badge {
      font-family: Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 999px;
      letter-spacing: 0.03em;
    }
    .badge-blue   { background: rgba(0,136,204,0.2);  color: #7ED0FF; border: 1px solid rgba(0,136,204,0.4); }
    .badge-orange { background: rgba(255,119,0,0.2);  color: #FFB066; border: 1px solid rgba(255,119,0,0.4); }
    .badge-yellow { background: rgba(255,204,0,0.15); color: #FFE066; border: 1px solid rgba(255,204,0,0.35); }

    /* Right: calculator icon + badge */
    .right {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .icon-wrap {
      width: 200px;
      height: 200px;
      border-radius: 40px;
      background: rgba(0,136,204,0.15);
      border: 2px solid rgba(0,136,204,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rotating-badge {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #FFCC00;
      border: 3px solid rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 10px;
    }
    .rotating-badge .rb-line1 {
      font-family: Arial, sans-serif;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #0D2137;
      line-height: 1.2;
    }
    .rotating-badge .rb-line2 {
      font-family: "Arial Black", sans-serif;
      font-size: 13px;
      font-weight: 900;
      color: #0D2137;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>
  <div class="topbar"></div>

  <div class="content">
    <div class="left">
      <div class="domain">
        <span class="blue">mein</span><span class="orange">umzugsrechner</span><span class="blue">.de</span>
      </div>

      <h1 class="headline">
        Umzugskosten<br>
        <span class="accent">berechnen.</span><br>
        Ohne Stress.
      </h1>

      <p class="sub">
        Realistischer Preiskorridor für Ihren Umzug —<br>
        kostenlos, ohne Anmeldung, ohne Datenweitergabe.
      </p>

      <div class="badges">
        <span class="badge badge-blue">Kein Formular</span>
        <span class="badge badge-orange">Kein Spam</span>
        <span class="badge badge-yellow">100 % kostenlos</span>
      </div>
    </div>

    <div class="right">
      <div class="icon-wrap">
        <!-- Calculator SVG -->
        <svg viewBox="0 0 24 24" fill="none" stroke="#0088CC" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round" width="100" height="100">
          <rect x="4" y="2" width="16" height="20" rx="2"/>
          <line x1="8" y1="6" x2="16" y2="6"/>
          <rect x="8" y="10" width="2" height="2" rx="0.5"/>
          <rect x="11" y="10" width="2" height="2" rx="0.5"/>
          <rect x="14" y="10" width="2" height="2" rx="0.5"/>
          <rect x="8" y="14" width="2" height="2" rx="0.5"/>
          <rect x="11" y="14" width="2" height="2" rx="0.5"/>
          <rect x="14" y="14" width="2" height="2" rx="0.5"/>
          <rect x="8" y="18" width="5" height="2" rx="0.5"/>
          <rect x="14" y="18" width="2" height="2" rx="0.5"/>
        </svg>
      </div>

      <div class="rotating-badge">
        <span class="rb-line1">Ohne<br>Lead&shy;verkauf</span>
        <span class="rb-line2">Orientierung</span>
      </div>
    </div>
  </div>
</body>
</html>
